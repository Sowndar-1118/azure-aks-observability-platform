name: CI-CD Pipeline

on:
push:
branches:
- main

jobs:
build-push-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Source Code
    uses: actions/checkout@v4

  - name: Login to Azure Container Registry
    uses: docker/login-action@v3
    with:
      registry: ${{ secrets.ACR_LOGIN_SERVER }}
      username: ${{ secrets.ACR_USERNAME }}
      password: ${{ secrets.ACR_PASSWORD }}

  - name: Build Docker Image
    run: |
      docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/aks-observability:${{ github.sha }} ./app

  - name: Push Docker Image
    run: |
      docker push ${{ secrets.ACR_LOGIN_SERVER }}/aks-observability:${{ github.sha }}

  - name: Azure Login
    uses: azure/login@v2
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - name: Set AKS Context
    uses: azure/aks-set-context@v4
    with:
      resource-group: aks-observability-rg
      cluster-name: aks-observability-cluster

  - name: Apply Kubernetes Manifests
    run: |
      kubectl apply -f kubernetes/deployment.yaml
      kubectl apply -f kubernetes/service.yaml

  - name: Update Deployment Image
    run: |
      kubectl set image deployment/aks-observability-app \
      aks-observability-app=${{ secrets.ACR_LOGIN_SERVER }}/aks-observability:${{ github.sha }}

  - name: Verify Rollout
    run: |
      kubectl rollout status deployment/aks-observability-app

  - name: Show Pods
    run: |
      kubectl get pods
```

